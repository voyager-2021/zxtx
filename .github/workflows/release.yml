name: Roll release

permissions:
  contents: write
  id-token: write
  attestations: write

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip and build wheels
        uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Create and activate venv
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -r requirements.txt
          python -m pip install .

      - name: Run pre-commit
        run: |
          source .venv/bin/activate
          pre-commit run --all-files || true

      - name: Run tests with coverage
        run: |
          source .venv/bin/activate
          PYTHONPATH=src coverage run -m pytest -m "not slow"
          coverage report
          coverage xml

      - name: Build wheels
        run: |
          source .venv/bin/activate
          python -m build --wheel

      - name: Upload wheels
        uses: actions/upload-artifact@v7.0.1
        with:
          name: wheels-${{ matrix.python-version }}
          path: dist/*.whl

  release:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/zxtx

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.14'

      - name: Create and activate venv
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Get version from setup.cfg
        id: get_version
        run: |
          source .venv/bin/activate
          VERSION=$(python3 -c "import configparser;cfg=configparser.ConfigParser();cfg.read('setup.cfg');print(cfg['metadata']['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download all wheels
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Build source distribution
        run: |
          source .venv/bin/activate
          python -m build --sdist

      - name: Sign packages
        uses: sigstore/gh-action-sigstore-python@v3.3.0
        with:
          inputs: >-
            dist/*.tar.gz
            dist/*.whl

      - name: Push Git tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag ${{ steps.get_version.outputs.version }}
          git push origin ${{ steps.get_version.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: Release ${{ steps.get_version.outputs.version }}
          generate_release_notes: true
          files: |
            dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          attestations: true
          packages-dir: dist/
