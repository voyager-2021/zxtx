name: Roll release

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --dev

      - name: Run pre-commit
        run: uv run pre-commit run --all-files

      - name: Run tests with coverage
        run: |
          uv run coverage run -m pytest -m "not slow"
          uv run coverage report
          uv run coverage xml

  build:
    name: Build release artifacts
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build distributions
        run: |
          rm -rf dist
          uv build --out-dir dist

      - name: Upload distributions
        uses: actions/upload-artifact@v7.0.0
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  release:
    name: Create release and publish
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    environment:
      name: pypi
      url: https://pypi.org/p/zxtx

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Get version from pyproject.toml
        id: version
        run: |
          VERSION="$(grep -E '^version = ' pyproject.toml | head -n1 | sed 's/version = \"//; s/\"$//')"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download distributions
        uses: actions/download-artifact@v8.0.1
        with:
          name: dist
          path: dist

      - name: Sign distributions
        uses: sigstore/gh-action-sigstore-python@v3.3.0
        with:
          inputs: |
            dist/*.tar.gz
            dist/*.whl

      - name: Move signatures outside dist
        run: |
          set -eu
          mkdir -p release-signatures
          find dist -maxdepth 1 -name '*.sigstore.json' -exec mv {} release-signatures/ \;

      - name: Push Git tag if missing
        run: |
          set -eu
          TAG="${{ steps.version.outputs.version }}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG already exists."
          else
            git tag "$TAG"
            git push origin "refs/tags/$TAG"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*.tar.gz
            dist/*.whl
            release-signatures/*.sigstore.json

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          attestations: true
          packages-dir: dist/
