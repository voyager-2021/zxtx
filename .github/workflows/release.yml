name: Roll release

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt -r requirements.txt
          python -m pip install .

      - name: Run pre-commit
        run: pre-commit run --all-files

      - name: Run tests with coverage
        run: |
          PYTHONPATH=src python -m coverage run -m pytest -m "not slow"
          python -m coverage report
          python -m coverage xml

  build:
    name: Build release artifacts
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip build

      - name: Build distributions
        run: |
          rm -rf dist
          python -m build --sdist --wheel --outdir dist

      - name: Upload distributions
        uses: actions/upload-artifact@v7.0.0
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  release:
    name: Create release and publish
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    environment:
      name: pypi
      url: https://pypi.org/p/zxtx

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Get version from setup.cfg
        id: version
        run: |
          VERSION="$(python3 -c 'import configparser; cfg = configparser.ConfigParser(); cfg.read("setup.cfg"); print(cfg["metadata"]["version"])')"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download distributions
        uses: actions/download-artifact@v8.0.1
        with:
          name: dist
          path: dist

      - name: Sign distributions
        uses: sigstore/gh-action-sigstore-python@v3.3.0
        with:
          inputs: |
            dist/*.tar.gz
            dist/*.whl

      - name: Move signatures outside dist
        run: |
          set -eu
          mkdir -p release-signatures
          find dist -maxdepth 1 -name '*.sigstore.json' -exec mv {} release-signatures/ \;

      - name: Push Git tag if missing
        run: |
          set -eu
          TAG="${{ steps.version.outputs.version }}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG already exists."
          else
            git tag "$TAG"
            git push origin "refs/tags/$TAG"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*.tar.gz
            dist/*.whl
            release-signatures/*.sigstore.json

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          attestations: true
          packages-dir: dist/
