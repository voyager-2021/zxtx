[tox]
envlist =
    ruff
    pip-audit
    py310
    py311
    py312
    py313

isolated_build = true
skip_missing_interpreters = true
requires =
    tox>=4.24
    tox-uv>=1.26

[testenv]
description = Run tests with pytest
runner = uv-venv-runner

dependency_groups =
    dev

setenv =
    PYTHONPATH = {toxinidir}/src

commands =
    coverage run -m pytest --basetemp={envtmpdir} -m "not slow"
    coverage report
    coverage xml

[testenv:ruff]
description = Run ruff lint and format checks
runner = uv-venv-runner
skip_install = true

deps =
    ruff>=0.14.0

commands =
    ruff check src tests
    ruff format --check src tests

[testenv:pip-audit]
description = Audit dependencies for vulnerabilities
runner = uv-venv-runner
skip_install = true

deps =
    pip-audit>=2.8.0

commands =
    pip-audit
